<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Carter Moyer's Portfolio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Syne:wght@700;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Syne:wght@700;800&family=Cinzel:wght@700&display=swap">
  <link rel="canonical" href="https://carter-portfolio.fyi/">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script async src="https://js.stripe.com/v3/buy-button.js"></script>
  
  <!-- Iframe Diagnostics -->
  <script>
    (function() {
      console.log('🛡️ [Iframe-Diag] Diagnostic engine active.');
      
      window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'CHECK_IN') {
          console.log('✅ [Iframe-Diag] Handshake SUCCESS:', event.data.project, 'origin:', event.origin);
        }
      });

      // Log iframe status after 5 seconds
      setTimeout(() => {
        document.querySelectorAll('iframe').forEach(iframe => {
          console.log('🔍 [Iframe-Diag] Checking Iframe:', iframe.src);
        });
      }, 5000);
    })();
  </script>

</head>

<body class="bg-[#020617] text-slate-50">
  <app-root></app-root>
</body>

</html>
