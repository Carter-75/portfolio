<section class="section-spacing animate-fade-in relative">
  <div class="blur-glow bg-blue-600/5 top-0 left-0"></div>

  <div class="mb-32 text-center">
    <h1 class="text-6xl md:text-8xl font-black mb-8 gradient-text tracking-tighter">Featured Engineering</h1>
    <p class="text-slate-400 text-xl md:text-2xl max-w-3xl mx-auto font-medium tracking-tight">
      Proven technical solutions in full-stack architecture, AI integration, and core infrastructure development.
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-12">
    <div *ngFor="let p of projects" class="premium-card flex flex-col h-full group border-transparent hover:border-blue-600/30">
      <div class="flex-1">
        <h3 class="text-3xl font-black text-white mb-6 group-hover:text-blue-500 transition-colors tracking-tighter">{{ p.title }}</h3>
        <p class="text-slate-400 text-base mb-10 leading-relaxed font-medium">{{ p.description }}</p>
        
        <div *ngIf="p.engineeringValue" class="mb-10 p-8 rounded-[2rem] bg-blue-600/5 border border-blue-500/10">
          <h4 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.4em] mb-4">Engineering Core</h4>
          <p class="text-slate-300 text-sm italic font-medium leading-relaxed">{{ p.engineeringValue }}</p>
        </div>

        <div *ngIf="p.challenge" class="mb-10">
          <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] mb-3">Architectural Challenge</h4>
          <p class="text-slate-400 text-sm font-medium leading-relaxed">{{ p.challenge }}</p>
        </div>

        <div class="flex flex-wrap gap-3 mb-12">
          <span *ngFor="let t of p.tech" class="px-4 py-2 rounded-xl bg-slate-950 border border-white/5 text-[10px] font-black text-slate-500 uppercase tracking-widest hover:border-blue-600/40 hover:text-white transition-all duration-300 cursor-default">
            {{ t }}
          </span>
        </div>
      </div>

      <a [href]="p.link" target="_blank" class="w-full py-6 rounded-2xl bg-blue-700 hover:bg-blue-600 text-white font-black text-center transition-all duration-500 flex items-center justify-center gap-3 shadow-xl shadow-blue-900/20 group/btn overflow-hidden relative">
        <span class="relative z-10 transition-transform duration-500 group-hover/btn:translate-x-1">Launch Implementation</span>
        <svg class="w-5 h-5 relative z-10 transition-transform duration-500 group-hover/btn:translate-x-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      </a>
    </div>
  </div>
</section>
