<!-- Floating Bubble -->
<div class="fixed bottom-4 right-4 sm:bottom-8 sm:right-8 w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-[0_20px_50px_rgba(37,99,235,0.4)] cursor-pointer hover:scale-110 active:scale-95 transition-all z-[10000] border border-white/20 backdrop-blur-3xl animate-float will-change-transform
            max-sm:shadow-none max-sm:bg-transparent max-sm:border-none" 
     (click)="toggleChat()">
  <div class="relative w-full h-full flex items-center justify-center">
    <!-- Static, elegant icon -->
    <svg *ngIf="!isOpen" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-blue-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
    </svg>
    <span *ngIf="isOpen" class="text-xl font-light text-white">✕</span>
    <div *ngIf="!isOpen && chat.isReady()" class="absolute top-1 right-1 w-2.5 h-2.5 bg-blue-500 rounded-full border-2 border-[#020617] animate-ping"></div>
  </div>
</div>

<!-- Chat Window -->
<div *ngIf="isOpen" 
     class="fixed bottom-20 right-4 sm:bottom-28 sm:right-8 w-[calc(100vw-2rem)] sm:w-[420px] h-[min(600px,calc(100dvh-6rem))] bg-slate-950 border border-blue-900/40 rounded-[2rem] sm:rounded-[2.5rem] flex flex-col shadow-[0_50px_100px_-20px_rgba(2,6,23,0.7)] z-[9999] overflow-hidden will-change-transform animate-scaleIn
            max-sm:bottom-0 max-sm:right-0 max-sm:left-0 max-sm:w-full max-sm:h-full max-sm:rounded-none max-sm:border-t max-sm:border-blue-500/20">
  <!-- Header -->
  <div class="p-6 border-b border-white/5 flex items-center justify-between bg-blue-950/20">
    <div class="flex items-center gap-4">
      <div class="relative">
        <div class="w-3 h-3 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.5)]" 
             [ngClass]="chat.isReady() ? 'bg-blue-400' : 'bg-yellow-500 animate-pulse'"></div>
      </div>
      <div class="flex flex-col">
        <span class="text-xs font-black text-white uppercase tracking-[0.2em]">AI Assistant</span>
        <span class="fluid-tiny text-slate-500 font-bold uppercase tracking-widest">Powered by GPT-4o</span>
      </div>
    </div>
    <div class="fluid-tiny font-black text-blue-500/50 uppercase tracking-widest">v5.0</div>
  </div>

  <!-- Messages -->
  <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-6 scrollbar-hide">
    <div *ngFor="let msg of chat.messages()" 
         [class]="msg.role === 'user' ? 'self-end max-w-[85%] animate-slideInRight' : 'self-start max-w-[85%] animate-slideInLeft'">
      <div [class]="msg.role === 'user' 
             ? 'bg-blue-700 text-white ml-auto rounded-2xl rounded-tr-none shadow-xl' 
             : 'bg-slate-900/80 text-slate-300 mr-auto rounded-2xl rounded-tl-none border border-white/5 shadow-xl'"
           class="px-5 py-3 text-sm leading-relaxed">
        {{ msg.text }}
      </div>
    </div>

    <!-- Connecting State -->
    <div *ngIf="!chat.isReady()" class="flex flex-col items-center justify-center py-12 text-center space-y-6">
      <div class="text-blue-500 font-black fluid-tiny uppercase tracking-[0.5em] animate-pulse">
        Connecting to AI...
      </div>
    </div>

    <div *ngIf="chat.isGenerating()" class="animate-pulse flex items-center gap-2 text-blue-500/50 italic fluid-tiny font-black uppercase tracking-widest self-start">
      <span class="flex h-1.5 w-1.5 rounded-full bg-blue-500/50"></span>
      Generating response...
    </div>
  </div>

  <!-- Input -->
  <div class="p-6 border-t border-white/5 bg-slate-950/20">
    <form (submit)="send()" class="flex gap-4">
      <input 
        type="text" 
        [(ngModel)]="userInput" 
        name="chatInput"
        placeholder="Ask about Carter's work..." 
        [disabled]="!chat.isReady() || chat.isGenerating()"
        class="flex-1 bg-slate-950/80 border border-white/5 rounded-xl px-5 py-3 text-sm text-white focus:border-blue-700 focus:ring-4 focus:ring-blue-600/5 outline-none disabled:opacity-30 transition-all duration-500 placeholder:text-slate-700 font-medium"
      />
      <button 
        type="submit" 
        [disabled]="!chat.isReady() || chat.isGenerating()"
        class="px-4 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-black transition-all active:scale-95 disabled:opacity-20"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
      </button>
    </form>
    <div class="flex items-center justify-center gap-2 mt-4">
      <span class="w-1 h-1 rounded-full bg-slate-800"></span>
      <p class="fluid-tiny text-slate-600 font-black uppercase tracking-[0.3em]">GPT-4o | Server-Side Intelligence</p>
      <span class="w-1 h-1 rounded-full bg-slate-800"></span>
    </div>
  </div>
</div>
