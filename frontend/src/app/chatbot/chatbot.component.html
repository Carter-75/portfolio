<!-- Floating Bubble -->
<div class="chat-bubble shadow-2xl shadow-blue-900/40 border border-white/10 glass-effect hover:scale-110 transition-transform duration-500" 
     (click)="toggleChat()">
  <div class="relative w-full h-full flex items-center justify-center">
    <span *ngIf="!isOpen" class="text-2xl animate-pulse">🤖</span>
    <span *ngIf="isOpen" class="text-xl font-black text-white">✕</span>
    <div *ngIf="!isOpen && chat.isReady()" class="absolute top-0 right-0 w-3 h-3 bg-blue-500 rounded-full border-2 border-[#0f172a] animate-ping"></div>
  </div>
</div>

<!-- Chat Window -->
<div *ngIf="isOpen" class="chat-window premium-card !p-0 overflow-hidden flex flex-col shadow-[0_35px_100px_-15px_rgba(30,58,138,0.3)] border-blue-900/20 backdrop-blur-3xl">
  <!-- Header -->
  <div class="p-6 border-b border-white/5 flex items-center justify-between bg-blue-950/20">
    <div class="flex items-center gap-4">
      <div class="relative">
        <div class="w-3 h-3 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.5)]" 
             [ngClass]="chat.isReady() ? 'bg-blue-400' : 'bg-yellow-500 animate-pulse'"></div>
      </div>
      <div class="flex flex-col">
        <span class="text-xs font-black text-white uppercase tracking-[0.2em]">Neural Link</span>
        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Active Intelligence Interface</span>
      </div>
    </div>
    <div class="text-[10px] font-black text-blue-500/50 uppercase tracking-widest">v4.2.0</div>
  </div>

  <!-- Messages -->
  <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-6 scrollbar-hide">
    <div *ngFor="let msg of chat.messages()" 
         [ngClass]="msg.role === 'user' ? 'message-user' : 'message-ai'"
         class="animate-fade-in">
      <div class="max-w-[85%] px-5 py-3 rounded-2xl text-sm leading-relaxed"
           [ngClass]="msg.role === 'user' 
             ? 'bg-blue-700 text-white ml-auto rounded-tr-none' 
             : 'bg-slate-900/80 text-slate-300 mr-auto rounded-tl-none border border-white/5'">
        {{ msg.text }}
      </div>
    </div>

    <!-- Initialization / Loading -->
    <div *ngIf="!chat.isReady()" class="flex flex-col items-center justify-center py-12 text-center space-y-6">
      <div class="text-blue-500 font-black text-[10px] uppercase tracking-[0.5em] animate-pulse">Syncing Core Logic...</div>
      <div class="w-full bg-slate-950 h-1.5 rounded-full overflow-hidden max-w-[180px] border border-white/5 shadow-inner">
        <div class="bg-blue-600 h-full transition-all duration-700 shadow-[0_0_15px_rgba(37,99,235,0.8)]" 
             [style.width.%]="chat.loadProgress()"></div>
      </div>
    </div>

    <div *ngIf="chat.isGenerating()" class="message-ai animate-pulse flex items-center gap-2 text-blue-500/50 italic text-[10px] font-black uppercase tracking-widest">
      <span class="flex h-1.5 w-1.5 rounded-full bg-blue-500/50"></span>
      Processing Payload...
    </div>
  </div>

  <!-- Input -->
  <div class="p-6 border-t border-white/5 bg-slate-950/20">
    <form (submit)="send()" class="flex gap-4">
      <input 
        type="text" 
        [(ngModel)]="userInput" 
        name="chatInput"
        placeholder="Query global context..." 
        [disabled]="!chat.isReady() || chat.isGenerating()"
        class="flex-1 bg-slate-950/80 border border-white/5 rounded-xl px-5 py-3 text-sm text-white focus:border-blue-700 focus:ring-4 focus:ring-blue-600/5 outline-none disabled:opacity-30 transition-all duration-500 placeholder:text-slate-700 font-medium"
      />
      <button 
        type="submit" 
        [disabled]="!chat.isReady() || chat.isGenerating()"
        class="primary-btn !px-4 !py-3 !rounded-xl disabled:opacity-20 transition-all"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
      </button>
    </form>
    <div class="flex items-center justify-center gap-2 mt-4">
      <span class="w-1 h-1 rounded-full bg-slate-800"></span>
      <p class="text-[8px] text-slate-600 font-black uppercase tracking-[0.3em]">Edge Runtime Computing | No External APIs</p>
      <span class="w-1 h-1 rounded-full bg-slate-800"></span>
    </div>
  </div>
</div>
